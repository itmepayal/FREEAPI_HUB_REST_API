version: "3.9"

services:
  web:
    build: .
    # Let Dockerfile CMD run Daphne; do NOT override command
    volumes:
      - .:/app
    ports:
      - "8000:8000" # only for local dev
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freeapi_db
    ports:
      - "5432:5432" # only for local dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379" # only for local dev

  celery:
    build: .
    command: sh -c "celery -A config worker -l info"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
